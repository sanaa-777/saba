# GitHub Actions: Automatic News Fetching
# Runs every 15 minutes as primary fetcher (Vercel Cron is backup)

name: Fetch News

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:  # Manual trigger

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Trigger news fetch
        id: fetch
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X GET "${{ secrets.SITE_URL }}/api/cron/fetch-news?source=github" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "User-Agent: GitHub-Actions-NewsFetcher/1.0" \
              -H "Accept: application/json" \
              --max-time 120)
            
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            
            echo "HTTP: $HTTP_CODE"
            echo "$BODY" | head -20
            
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              SKIPPED=$(echo "$BODY" | jq -r '.skipped // false')
              if [ "$SKIPPED" = "true" ]; then
                echo "⏭️ Skipped (another fetch in progress)"
                exit 0
              fi
              
              TOTAL_NEW=$(echo "$BODY" | jq -r '.totalNew // 0')
              ERRORS=$(echo "$BODY" | jq -r '.errors // 0')
              echo "📰 New: $TOTAL_NEW | Errors: $ERRORS"
              
              if [ "$TOTAL_NEW" -gt 0 ]; then
                echo "✅ New articles fetched!"
                exit 0
              fi
            fi
            
            echo "Waiting 30s before retry..."
            sleep 30
          done
          
          echo "::warning::All fetch attempts completed with no new articles"

      - name: Report failure
        if: failure()
        run: echo "::error::News fetch workflow failed"
